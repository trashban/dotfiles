# set leader (ctrl+a)
unbind C-b
set-option -g prefix M-a
bind-key M-a send-prefix

# set reload config (ctrl+r)
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display "Config reloaded!"

# set base index
set -g base-index 1
setw -g pane-base-index 1

# use default shell
set -g default-command "${SHELL}"

# set tmux colours
set -g default-terminal "screen-256color"

# allow mouse scroll
setw -g mouse on
unbind-key -T copy-mode-vi MouseDragEnd1Pane # idk

# clipboard wayland support
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy && wl-paste -n | wl-copy -p"
bind-key p run "wl-paste -n | tmux load-buffer - ; tmux paste-buffer"

# disable bell
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
set -g message-style 'fg=yellow bg=red bold'

# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 10

# increase limits
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5

# focus events
set -g focus-events on

# apparently good for multi-monitors
setw -g aggressive-resize on

# set tmux to show on the top
set -g status-position top

# panes
set -g renumber-windows on
set -g pane-border-style 'fg=purple'

# statusbar
set -g window-status-style 'fg=purple bg=black'
set -g status-position top
set -g status-justify left
set -g status-style 'fg=#5a4fcf'
set -g status-left ''
set -g status-right ''
set -g status-left-length 20
set -g status-right-length 20
